<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="800" fill="#ffffff"/>

  <!-- Navbar -->
  <rect width="1200" height="64" fill="#ffffff" stroke="#f3f4f6" stroke-width="1"/>
  <text x="28" y="40" font-size="22" font-weight="900" fill="#E8175D">🐷 Moonpig</text>
  <text x="220" y="40" font-size="14" font-weight="500" fill="#6b7280">Cards</text>
  <rect x="750" y="18" width="340" height="32" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="775" y="38" font-size="13" fill="#9ca3af">Search cards &amp; gifts…</text>
  <!-- Basket with 1 item -->
  <circle cx="1150" cy="32" r="20" fill="#fff0f6"/>
  <text x="1140" y="38" font-size="16">🧺</text>
  <circle cx="1165" cy="15" r="9" fill="#E8175D"/>
  <text x="1162" y="20" font-size="10" font-weight="700" fill="white">1</text>

  <!-- Breadcrumb -->
  <text x="40" y="92" font-size="13" fill="#9ca3af">Home / Cards / Happy Birthday Sis 🎂</text>

  <!-- LEFT: Card Image -->
  <rect x="40" y="112" width="480" height="320" rx="24" fill="#FFD6E7"/>
  <!-- Decorative circles -->
  <circle cx="480" cy="115" r="80" fill="#C4124F" opacity="0.12"/>
  <circle cx="60" cy="400" r="110" fill="#C4124F" opacity="0.08"/>
  <text x="280" y="280" font-size="100" text-anchor="middle">🎂</text>
  <text x="280" y="400" font-size="18" font-weight="700" text-anchor="middle" fill="#C4124F">Happy Birthday Sis 🎂</text>

  <!-- Message preview box -->
  <rect x="40" y="450" width="480" height="110" rx="16" fill="#FFD6E7" opacity="0.5" stroke="#C4124F" stroke-dasharray="6,4" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="60" y="474" font-size="10" font-weight="700" fill="#C4124F" letter-spacing="0.08em">YOUR MESSAGE PREVIEW</text>
  <text x="60" y="498" font-size="14" fill="#374151" font-style="italic">"Wishing you the most magical birthday</text>
  <text x="60" y="518" font-size="14" fill="#374151" font-style="italic">ever! Hope it's filled with cake 🎂</text>
  <text x="60" y="538" font-size="14" fill="#374151" font-style="italic">and joy. Love you loads! 💕"</text>

  <!-- RIGHT: Product Info -->
  <rect x="40" y="74" width="72" height="22" rx="11" fill="#fdf2f8" stroke="#fce7f3" stroke-width="1"/>
  <text x="557" y="92" font-size="11" font-weight="600" fill="#E8175D">Birthday</text>

  <text x="548" y="136" font-size="28" font-weight="900" fill="#111827">Happy Birthday Sis 🎂</text>
  <text x="548" y="170" font-size="14" fill="#6b7280">A gorgeous birthday card for your amazing</text>
  <text x="548" y="190" font-size="14" fill="#6b7280">sister. Tell her how much she means to you.</text>

  <text x="548" y="234" font-size="40" font-weight="900" fill="#E8175D">£3.99</text>
  <text x="660" y="234" font-size="13" fill="#9ca3af">+ £2.99 delivery</text>

  <!-- Message input label -->
  <text x="548" y="276" font-size="14" font-weight="600" fill="#374151">✍️ Add your personal message</text>
  <rect x="548" y="288" width="590" height="100" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="564" y="314" font-size="13" fill="#9ca3af">Write something heartfelt… e.g. Happy Birthday!</text>
  <text x="564" y="334" font-size="13" fill="#9ca3af">Hope your day is as amazing as you are! 🎉</text>
  <text x="1120" y="380" font-size="11" fill="#9ca3af" text-anchor="end">0/300</text>

  <!-- Quantity -->
  <text x="548" y="420" font-size="14" font-weight="600" fill="#374151">Quantity</text>
  <rect x="640" y="402" width="110" height="36" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="648" y="425" font-size="18" fill="#374151">‹</text>
  <text x="685" y="426" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">1</text>
  <text x="732" y="425" font-size="18" fill="#374151">›</text>

  <!-- Add to basket button -->
  <rect x="548" y="454" width="590" height="52" rx="26" fill="#E8175D"/>
  <text x="843" y="485" font-size="16" font-weight="700" fill="white" text-anchor="middle">🧺  Add to Basket — £3.99</text>

  <!-- Delivery info box -->
  <rect x="548" y="522" width="590" height="100" rx="16" fill="#f9fafb"/>
  <text x="568" y="550" font-size="13" fill="#374151">🚚 <tspan font-weight="700">Next Day Delivery</tspan> available on orders before 9pm</text>
  <text x="568" y="574" font-size="13" fill="#374151">📦 <tspan font-weight="700">Standard Delivery</tspan> £2.99 — arrives in 2–3 days</text>
  <text x="568" y="598" font-size="13" fill="#374151">✅ <tspan font-weight="700">Satisfaction Guaranteed</tspan> — not happy? We'll resend free</text>

  <!-- TODO comment hint -->
  <rect x="548" y="638" width="590" height="36" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="568" y="661" font-size="12" fill="#92400e" font-family="monospace">// TODO: Add Copilot-suggested add-ons (e.g. gift wrap, balloon)</text>
</svg>
