<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="700" fill="#ffffff"/>

  <!-- Navbar -->
  <rect width="1200" height="64" fill="#ffffff" stroke="#f3f4f6" stroke-width="1"/>
  <text x="28" y="40" font-size="22" font-weight="900" fill="#E8175D">🐷 Moonpig</text>
  <text x="220" y="40" font-size="14" font-weight="500" fill="#6b7280">Cards</text>
  <rect x="750" y="18" width="340" height="32" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="775" y="38" font-size="13" fill="#9ca3af">Search cards &amp; gifts…</text>
  <circle cx="1150" cy="32" r="20" fill="#fff0f6"/>
  <text x="1140" y="38" font-size="16">🧺</text>
  <circle cx="1165" cy="15" r="9" fill="#E8175D"/>
  <text x="1162" y="20" font-size="10" font-weight="700" fill="white">2</text>

  <!-- Page header -->
  <text x="40" y="104" font-size="28" font-weight="900" fill="#111827">Your Basket</text>
  <text x="1090" y="104" font-size="13" fill="#9ca3af">Clear all</text>

  <!-- Basket items (left, 2/3 width) -->
  <!-- Item 1 -->
  <rect x="40" y="124" width="740" height="110" rx="16" fill="#ffffff" stroke="#f3f4f6" stroke-width="1.5"/>
  <rect x="60" y="144" width="72" height="72" rx="12" fill="#FFD6E7"/>
  <text x="96" y="192" font-size="28" text-anchor="middle">🎂</text>
  <text x="152" y="160" font-size="15" font-weight="600" fill="#111827">Happy Birthday Sis 🎂</text>
  <text x="152" y="178" font-size="12" fill="#6b7280" font-style="italic">"Wishing you the most magical birthday ever!"</text>
  <text x="152" y="196" font-size="11" fill="#9ca3af">Birthday</text>
  <!-- Quantity controls -->
  <rect x="152" y="208" width="90" height="28" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="162" y="227" font-size="14" fill="#374151">−</text>
  <text x="190" y="228" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">1</text>
  <text x="228" y="227" font-size="14" fill="#374151">+</text>
  <text x="680" y="228" font-size="16" font-weight="700" fill="#E8175D">£3.99</text>
  <text x="730" y="228" font-size="16" fill="#d1d5db">🗑</text>

  <!-- Item 2 -->
  <rect x="40" y="248" width="740" height="110" rx="16" fill="#ffffff" stroke="#f3f4f6" stroke-width="1.5"/>
  <rect x="60" y="268" width="72" height="72" rx="12" fill="#FFE8F0"/>
  <text x="96" y="316" font-size="28" text-anchor="middle">💕</text>
  <text x="152" y="284" font-size="15" font-weight="600" fill="#111827">Happy Anniversary 💕</text>
  <text x="152" y="302" font-size="12" fill="#6b7280" font-style="italic">"To my amazing partner, thank you for everything"</text>
  <text x="152" y="320" font-size="11" fill="#9ca3af">Anniversary</text>
  <rect x="152" y="332" width="90" height="28" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="162" y="351" font-size="14" fill="#374151">−</text>
  <text x="190" y="352" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">2</text>
  <text x="228" y="351" font-size="14" fill="#374151">+</text>
  <text x="680" y="352" font-size="16" font-weight="700" fill="#E8175D">£9.98</text>
  <text x="730" y="352" font-size="16" fill="#d1d5db">🗑</text>

  <!-- Add more cards -->
  <rect x="40" y="372" width="740" height="52" rx="16" fill="white" stroke="#fce7f3" stroke-dasharray="6,3" stroke-width="1.5"/>
  <text x="410" y="403" font-size="14" font-weight="600" fill="#E8175D" text-anchor="middle">+ Add more cards</text>

  <!-- TODO comment -->
  <rect x="40" y="436" width="740" height="36" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="60" y="459" font-size="12" fill="#92400e" font-family="monospace">// TODO: Add promo code field</text>

  <!-- Order Summary (right, 1/3) -->
  <rect x="808" y="124" width="354" height="290" rx="16" fill="#ffffff" stroke="#f3f4f6" stroke-width="1.5"/>
  <text x="828" y="158" font-size="17" font-weight="700" fill="#111827">Order Summary</text>

  <line x1="828" y1="172" x2="1142" y2="172" stroke="#f3f4f6" stroke-width="1"/>

  <text x="828" y="200" font-size="14" fill="#6b7280">Subtotal (3 items)</text>
  <text x="1142" y="200" font-size="14" font-weight="500" fill="#111827" text-anchor="end">£13.97</text>

  <text x="828" y="228" font-size="14" fill="#6b7280">Delivery</text>
  <text x="1142" y="228" font-size="14" font-weight="500" fill="#111827" text-anchor="end">£2.99</text>

  <line x1="828" y1="244" x2="1142" y2="244" stroke="#f3f4f6" stroke-width="1"/>

  <text x="828" y="272" font-size="18" font-weight="900" fill="#111827">Total</text>
  <text x="1142" y="272" font-size="22" font-weight="900" fill="#E8175D" text-anchor="end">£16.96</text>

  <rect x="828" y="290" width="314" height="52" rx="26" fill="#E8175D"/>
  <text x="985" y="322" font-size="15" font-weight="700" fill="white" text-anchor="middle">🔒  Checkout Securely</text>

  <text x="985" y="362" font-size="12" fill="#9ca3af" text-anchor="middle">🔒 SSL encrypted checkout</text>
  <text x="985" y="378" font-size="12" fill="#9ca3af" text-anchor="middle">💳 Visa, Mastercard, PayPal accepted</text>
</svg>
