<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="1200" height="800" fill="#ffffff"/>

  <!-- Navbar -->
  <rect width="1200" height="64" fill="#ffffff" stroke="#f3f4f6" stroke-width="1"/>
  <text x="28" y="40" font-size="22" font-weight="900" fill="#E8175D">🐷 Moonpig</text>
  <text x="220" y="40" font-size="14" font-weight="500" fill="#6b7280">Cards</text>
  <text x="285" y="40" font-size="14" font-weight="500" fill="#6b7280">Gifts</text>
  <text x="340" y="40" font-size="14" font-weight="500" fill="#6b7280">Flowers</text>
  <text x="405" y="40" font-size="14" font-weight="500" fill="#6b7280">Offers</text>
  <!-- Search bar -->
  <rect x="750" y="18" width="340" height="32" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="775" y="38" font-size="13" fill="#9ca3af">Search cards &amp; gifts…</text>
  <!-- Basket icon -->
  <circle cx="1150" cy="32" r="20" fill="#fff0f6" stroke="#fce7f3" stroke-width="1"/>
  <text x="1140" y="38" font-size="16">🧺</text>

  <!-- Hero Section -->
  <rect x="0" y="64" width="1200" height="340" fill="url(#heroGrad)"/>
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf2f8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fff1f2;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Hero text -->
  <rect x="40" y="104" width="160" height="28" rx="14" fill="#E8175D"/>
  <text x="60" y="122" font-size="12" font-weight="600" fill="white">✨ Free Personalisation</text>
  <text x="40" y="170" font-size="40" font-weight="900" fill="#111827">Send something</text>
  <text x="40" y="218" font-size="40" font-weight="900" fill="#E8175D">they'll never forget</text>
  <text x="40" y="260" font-size="16" fill="#6b7280">Personalised greeting cards, flowers and gifts delivered direct.</text>
  <text x="40" y="282" font-size="16" fill="#6b7280">From just £3.49 — because everyone deserves to feel special.</text>
  <rect x="40" y="310" width="180" height="48" rx="24" fill="#E8175D"/>
  <text x="78" y="340" font-size="15" font-weight="700" fill="white">Shop Cards →</text>
  <rect x="238" y="310" width="180" height="48" rx="24" fill="white" stroke="#E8175D" stroke-width="2"/>
  <text x="268" y="340" font-size="15" font-weight="700" fill="#E8175D">Browse Gifts</text>

  <!-- Hero card grid -->
  <rect x="660" y="90" width="240" height="130" rx="16" fill="#FFD6E7"/>
  <text x="760" y="162" font-size="42" text-anchor="middle">🎂</text>
  <text x="760" y="200" font-size="11" font-weight="600" text-anchor="middle" fill="#C4124F">Happy Birthday Sis</text>
  <rect x="920" y="90" width="240" height="130" rx="16" fill="#D6F5FF"/>
  <text x="1020" y="162" font-size="42" text-anchor="middle">🥳</text>
  <text x="1020" y="200" font-size="11" font-weight="600" text-anchor="middle" fill="#0066CC">To My Best Friend</text>
  <rect x="660" y="235" width="240" height="130" rx="16" fill="#FFE8F0"/>
  <text x="760" y="307" font-size="42" text-anchor="middle">💕</text>
  <text x="760" y="345" font-size="11" font-weight="600" text-anchor="middle" fill="#E8175D">Happy Anniversary</text>
  <rect x="920" y="235" width="240" height="130" rx="16" fill="#F5FFD6"/>
  <text x="1020" y="307" font-size="42" text-anchor="middle">🌸</text>
  <text x="1020" y="345" font-size="11" font-weight="600" text-anchor="middle" fill="#558B2F">Thank You Bunches</text>

  <!-- Pink trust bar -->
  <rect x="0" y="404" width="1200" height="44" fill="#E8175D"/>
  <text x="200" y="431" font-size="13" font-weight="500" fill="white">🚚 Next Day Delivery Available</text>
  <text x="510" y="431" font-size="13" font-weight="500" fill="white">⭐ 4.8/5 from 20M+ reviews</text>
  <text x="820" y="431" font-size="13" font-weight="500" fill="white">🛡️ 100% Satisfaction Guarantee</text>

  <!-- Shop by Occasion -->
  <text x="40" y="480" font-size="22" font-weight="900" fill="#111827">Shop by Occasion</text>
  <text x="40" y="502" font-size="14" fill="#6b7280">Whatever the moment, we've got the perfect card.</text>

  <!-- Category cards row -->
  <rect x="40" y="518" width="200" height="100" rx="16" fill="#FFD6E7"/>
  <text x="140" y="568" font-size="28" text-anchor="middle">🎂</text>
  <text x="140" y="598" font-size="11" font-weight="600" text-anchor="middle" fill="#C4124F">Birthday Cards</text>

  <rect x="255" y="518" width="200" height="100" rx="16" fill="#FFE8F0"/>
  <text x="355" y="568" font-size="28" text-anchor="middle">💕</text>
  <text x="355" y="598" font-size="11" font-weight="600" text-anchor="middle" fill="#E8175D">Anniversary Cards</text>

  <rect x="470" y="518" width="200" height="100" rx="16" fill="#F5FFD6"/>
  <text x="570" y="568" font-size="28" text-anchor="middle">🌸</text>
  <text x="570" y="598" font-size="11" font-weight="600" text-anchor="middle" fill="#558B2F">Thank You Cards</text>

  <rect x="685" y="518" width="200" height="100" rx="16" fill="#FFF8E1"/>
  <text x="785" y="568" font-size="28" text-anchor="middle">💐</text>
  <text x="785" y="598" font-size="11" font-weight="600" text-anchor="middle" fill="#E65100">Flowers</text>

  <rect x="900" y="518" width="200" height="100" rx="16" fill="#F3E5F5"/>
  <text x="1000" y="568" font-size="28" text-anchor="middle">🎁</text>
  <text x="1000" y="598" font-size="11" font-weight="600" text-anchor="middle" fill="#7B1FA2">Gifts</text>

  <!-- Trending section -->
  <rect x="0" y="636" width="1200" height="164" fill="#fdf2f8"/>
  <text x="40" y="672" font-size="22" font-weight="900" fill="#111827">🔥 Trending Now</text>
  <text x="40" y="692" font-size="12" fill="#6b7280">Most loved cards this week</text>
  <text x="1100" y="672" font-size="13" font-weight="600" fill="#E8175D">See all →</text>

  <!-- 6 mini cards -->
  <rect x="40" y="700" width="160" height="86" rx="12" fill="#FFD6E7"/><text x="120" y="748" font-size="22" text-anchor="middle">🎂</text>
  <rect x="215" y="700" width="160" height="86" rx="12" fill="#D6F5FF"/><text x="295" y="748" font-size="22" text-anchor="middle">🥳</text>
  <rect x="390" y="700" width="160" height="86" rx="12" fill="#FFE8F0"/><text x="470" y="748" font-size="22" text-anchor="middle">💕</text>
  <rect x="565" y="700" width="160" height="86" rx="12" fill="#D6EAFF"/><text x="645" y="748" font-size="22" text-anchor="middle">🍼</text>
  <rect x="740" y="700" width="160" height="86" rx="12" fill="#F3E5F5"/><text x="820" y="748" font-size="22" text-anchor="middle">🎉</text>
  <rect x="915" y="700" width="160" height="86" rx="12" fill="#FFF8E1"/><text x="995" y="748" font-size="22" text-anchor="middle">💐</text>
</svg>
